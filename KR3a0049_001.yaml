body:
  text: 知言卷一宋胡宏撰天命之謂性性天下之大本也堯舜禹湯文王仲尼六君子先後相詔必曰心而不曰性何也曰心也者知天地宰萬物以成性者也六君子盡心者也故能立天下之大本人至於今賴焉不然異端竝作物從其類而𤓰分孰能一之靜觀萬物之理得吾心之悅也易動處萬物之分得吾心之樂也難是故智仁合一然後君子之學成觀日月之盈虚知隂陽之消息觀隂陽之消息知聖人之進退財出於九賦兵起於鄉遂士選於庠塾政令行乎世臣然後政行乎百姓而仁覆天下矣生刑輕則易犯是教民以無恥也死刑重則難悔是絶民自新之路也死刑生刑輕重不相懸然後民知所避而風化可興矣自三代之道不行君臣之義不明君誘其臣以富貴臣干其君以文行夫君臣相與之際萬化之原也既汨於利矣末流其可禁乎此三代之治所以不復也堯舜禹湯文王仲尼之道天地中和之至非有取而後為之者也是以周乎萬物通乎無窮日用而不可離也釋氏乃為厭死生苦病老然後有取於心以自利耳本既如是求欲無弊其可得乎爵位儀章德之飾也有德則為等威君子之所欲無德則器物而已矣君子賤焉隂陽之升降邪正之内外一也是故仁者雖切切於世而亦不求道之必行也寒暑之始終天地之始終也拘於耳目聞見者衆人也無典彞法度者釋氏也安得其心該徧流通與論性命之理而返之正哉一裘裳也于冬之時舉之以為輕逮夏或舉之則不勝其重一絺綌也于夏之時舉之以為重逮冬或舉之則不勝其輕夫衣非隨時有異輕重也情狃於寒暑而亂其心非輕重之正也世有縁情立義自以為由正大之德而不之覺者亦若是而已矣孰能不狃於情以正其心定天下之公乎見善有不明則守之不固或懾於威嚴而失之或沒於情恩而失之或亂於精㣲而失之或汨於末流而失之偉哉孟氏之子生世之大弊承道之至衰藴經綸之大業進退辭受執極而不變用極而不亂屹然獨立於横流使天下後世曉然知强大威力之不可用士所以立身大夫所以立家諸侯所以立國天王所以保天下必本諸仁義也偉哉孟氏之子義者權之行也仁其審權者乎道充乎身塞乎天地而拘於軀者不見其大存乎飲食男女之事而溺於流者不知其精諸子百家億之以意飾之以辯傳聞襲見䝉心之官命之理性之道置之茫昧則已矣悲夫此邪說暴行所以盛行而不為其所惑者鮮也然則奈何曰在修吾身時之古今道之古今也道者體用之總名仁其體義其用合體與用斯為道矣大道廢焉有仁義老聃氏非知道者也義有定體仁無定用道無不可行之時時無不可成之事時無窮事萬變唯仁者為能處之不失其道而有成功權數智術用而或中則成不中則敗其成敗係人之能否而權度縱釋不在我者也豈不殆哉天命不已故人生無窮具耳目鼻口手足而成身合父子君臣夫婦長㓜朋友而成世非有假於外而强成之也是性然矣聖人明於大倫理於萬物暢於四肢達於天地一以貫之性外無物物外無性是故成已成物無可無不可焉釋氏絶物遯世棲身沖漠窺見天機有不器於物者遂以此自大謂萬物皆我心物不覺悟而我覺悟謂我獨髙於萬物於是顛倒作用莫知所止反為有適有莫不得道義之全名為識心見性洞然四達而實不能一貫展轉滛遁莫可致詰世之君子信其幻語而惑之孰若即吾身世而察之乎先道而後言故無不信之言先義而後行故無不果之行隂陽成象而天道著矣剛柔成質而地道著矣仁義成德而人道著矣萬物生於天萬事宰於心性天命也命人心也而氣經緯乎其間萬變著見而不可掩莫或使之非鬼神而何天理人欲同體而異用同行而異情進修君子宜深别焉法制者道德之顯爾道德者法制之隱爾天地之心生生不窮者也必有春秋冬夏之莭風雨霜露之變然後生物之功遂有道德結於民心而無法制者為無用無用者亡劉虞之類有法制縶於民身而無道德者為無體無體者滅暴秦之類是故法立制定茍非其人亦不可行也學進則所能日益德進則所能日損不已而天則所能亡矣事成則極極則變物盈則傾傾則革聖人裁成其道輔相其宜百姓於變而不知此堯舜之所以為聖也造車於室而可以通天下之險易鑄鑑於冶而可以定天下之妍醜蓋得其道而握其要也治天下者何獨不觀乎此反而求諸身乎是故一正君心而天下定矣一隂一陽之謂道有一則有三自三而無窮矣老氏謂一生二二生三非知太極之藴者也小道任術先其得後其義智已而愚民者也聖人由道而行其施也博其報也厚其散也廣其聚也多貪慾不生而天下通焉夫婦之道人醜之者以滛欲為事也聖人安之者以保合為義也接而知有禮焉交而知有道焉惟敬者為能守而不失也語曰樂而不滛則得性命之正矣謂之滛欲者非陋庸人而何變異見於天者理極而通數窮而更勢盡而反氣滋而息興者將廢成者將敗人君者天命之主所宜盡心也德動於氣吉者成凶者敗大者興小者廢天豈有心於彼此哉謂之譴告者人君覩是宜以自省也若以天命為可恃遇灾不懼肆滛心而出暴政未有不亡者也釋氏定其心而不理於事故聽其言如該通徵其行則顛沛儒者理於事而心有止故内不失成己外不失成物可以贊化育而與天地參也誠者命之道乎中者性之道乎仁者心之道乎唯仁者為能盡性至命自反則裕責人則蔽君子不臨事而恕己然後有自反之功自反者修身之本也本得則用無不利有毁人敗物之心者小人也操譽人成物之心者義士也油然平物各當其分而無為者君子也知人之道驗之於事而觀其詞氣從人反躬者鮮不為君子任己蓋非者鮮不為小人釋氏直曰吾見是性故自處以靜而萬物之動不能裁也自處以定而萬物之紛不能止也是亦天地一物之用耳自道參天地明並日月功用配鬼神者觀之則釋氏小之為丈夫矣其言夸大豈不猶坎井之蛙歟仁者天地之心也心不盡用君子而不仁者有矣萬物備而為人一物有未體非仁也萬民合而為君有一民不歸吾仁非王也天命為性人性為心不行己之欲不用己之智而循天之理所以求盡其心也修身以寡欲為要行己以恭儉為先自天子至於庻人一也道不能無物而自道物不能無道而自物道之有物猶風之有動水之有流也夫孰能間之故離物求道者妄而已矣釋氏之學必欲出死生者蓋以身為己私也天道有消息故人理有始終不私其身以公於天下四大和合無非至理六塵縁影無非妙用何事非真何物非我生生不窮無斷無滅此道之固然又豈人之所能為哉夫欲以人為者吾知其為邪矣道非仁不立孝者仁之基也仁者道之生也義者仁之質也未能無欲欲不行焉之謂大勇未能無惑惑不茍解之謂大智物不茍應務盡其心之謂大仁人而不仁則道義息强暴感仁義而服者有矣未聞以强暴服强暴而能有終者也孝莫大於寧親寧親莫大於存神神存天地之間順其命勿滅絶之而已矣死生者身之常也存亡者國之常也興廢者天下之常也絶滅者非常之變也聖人制四海之命法天而不私己盡制而不曲防分天下之地以為萬國而與英才共焉誠知興廢之無常不可以私守之也故農夫受田百畝諸侯百里天子千里農夫食其力諸侯報其功天子享其德此天下之分然非後世擅天下者以大制小以强制弱之謀也誠盡制而已矣是以虞夏商周傳祀長久皆千餘嵗論興廢則均有焉語絶滅則至暴秦郡縣天下然後及也自秦滅先王之制海内蕩然無有根本之固有今世王天下而繼世無置錐之地者有今年貴為天子而明年欲為匹夫不可得者天王尚然况其下者乎是以等威不立禮義難行俗化衰薄雖當興廢之常而受絶滅之禍也其為不孝孰大焉悲夫秦漢魏晉隋唐之君真可謂居絶滅之中而不自知者也是故大易垂訓必建萬國而親諸侯春秋立法興滅國而繼絶世物之生死理也理者萬物之貞也生聚而可見則為有死散而不可見則為無夫可以有無見者物之形也物之理則未嘗有無也老氏乃以有無為生物之本陋哉天得地而後有萬物夫得婦而後有男女君得臣而後有萬化此亦道之所以為至也井法行然後愚智可擇學無濫士野無濫農人才各得其所而游手鮮矣君臨卿卿臨大夫大夫臨士士臨農與工商所受有分制多寡均而無貧苦者矣人皆受地世世守之無交易之侵謀也無交易之侵謀則無爭奪之訟獄無爭奪之訟獄則刑罰省而民安刑罰省而民安則禮樂修而和氣應矣守身以仁以守身之道正其君者大臣也漢唐之盛忠臣烈士攻其君之過禁其君之欲糾其政之繆彈其人之佞而已求其大正君心引之志於仁者則吾未之見也惟董生其庶幾乎道可述不可作述之者天也作之者人也三王述之五伯作之其功德可考矣深於道者富用物而不盈衛公子荆善居室孔子何取焉以其心不嬰於物可以為法也夫人生於世用物以成其生耳其久能幾何而世人馳騖不反也維天之命於穆不已聖人知天命存於身者淵源無窮故施於民者溥博無盡而事功不同也知之則於一事功可以盡聖人之藴不知則一事功而已矣不足以言聖人也莊周乃曰聖人道之真以治身其緒餘土苴以治天下國家豈其然乎善為天下者務寢兵兵刑之大者耳雖漢唐盛主禮樂廢缺法令專行是兵常興而未嘗息也紀綱如是而欲有三代之文章其可得乎有情無情體同而用分人以其耳目所學習而不能超乎聞見之表故昭體用以示之則惑矣惑則茫然無所底止而為釋氏所引以心為宗心生萬法萬法皆心自滅天命固為已私小惑雖解大礙方張不窮理之過也彼其夸大言詞顛倒運用自謂至極矣然以聖人視之可謂欲仁而未至有智而未及者也夫生於戎夷亦間世之英也學之不正遂為異端小道惜哉聖人尚賢使民知勸教不能使民不爭明善惡之歸如日月之照白黑然民猶有惑於欲而陷於惡故孔子觀上世之化喟然而歎曰甚哉知之難也雖堯舜之民比屋可封能使之由而己亦不能使知之也夫人目於五色耳於五聲口於五味其性固然非外來也聖人因其性而道之由於至善故民之化之也易老子曰不見可欲使心不亂夫可欲者天下之公欲也而可蔽之使不見乎天地之生生萬物聖人之生生萬民固其理也老聃用其道計其成而以不爭行之是舞智尚術求怙天下之權以自私也其去天事逺矣
