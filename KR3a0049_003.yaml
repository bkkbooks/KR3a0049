body:
  text: 知言卷三宋胡宏撰文王之行王政至善美也孟子之言王道至詳約也然不越制其田里導之樹畜教之以孝悌忠信而已自五伯之亂以至於今田里之弊無窮樹畜之業不修孝悌之行不著忠信之風不立治道日茍刑罰日繁非有超百世英才之君臣與文王孟氏比肩者其孰能復之養民惟恐不足此世之所以治安也取民惟恐不足此世之所以敗亡也江河之流非舟不濟人取其濟則已矣不復留情於舟也澗壑之險非梁不渡人取其渡則已矣不復留情於梁也人於奉身濟生之物皆如是也不亦善乎淡然天地之間雖生死之變不能動其心矣生本無可好人之所以好生者以欲也死本無可惡人之所以惡死者亦以欲也生求稱其欲死懼失其欲憧憧天地之間莫不以欲為事而心學不傳矣有源之水寒冽不凍有德之人厄窮不塞以反求諸己為要法以言人不善為至戒行慎則能堅其志言慎則能崇其德下之於上德不待聲色而後化人之於其類不待聲色而後從禍福於善惡不待聲色而後應詩云民之秉彞好是懿德是故君子篤恭而天下平人固有逺迹江湖念絶於名利者矣然世或求之而不得免人固有置身朝市心屬於富貴者矣然世或舍之而不得進命之在人分定於天不可變也是以君子貴知命知命然後能信義惟患積德不足於身不患取資不足於世執斧斤者聽於施繩墨者然後大厦成執干戈者聽於明理義者然後大業定仁心立政之本也均田為政之先也田里不均雖有仁心而民不被其澤矣井田者聖人均田之要法也恩意聨屬姦宄不容少而不散多而不亂農賦既定軍制亦明矣三王之所以王者以其能制天下之田里政立仁施雖匹夫匹婦一衣一食如解衣衣之如推食食之其於萬物誠有調燮之法以佐贊乾坤化育之功非如後世之君不仁於民也桀紂秦政皆窮天下之惡百姓之所同惡故商周劉漢因天下之心伐而代之百姓親附居之安久所謂仁義之兵也魏晉以來莫不假人之柄而有隳三綱之罪仁義不立綱紀不張無以締固民心而欲居之安久可乎或問周室衰微諸侯更霸數百年及秦纍世窮兵極勢而後定天下天下已定其十三歲而亡何也曰秦之亡也久矣秦自孝公用商鞅之法勢日張而德日衰兵日振而俗日弊地日廣而民心日益散秦之亡也久矣然則賈生謂攻守之勢異非歟曰攻守一道也是故湯武由仁義以攻由仁義以守漢唐以仁義而攻以仁義而守子孫享之各數百年蓋得其道也曰秦失其道其能定天下何也曰時也六國之君其愚又甚於秦故秦能欺之以僥幸一時之勝而亡立至矣曰然則漢唐興義師不五六歲得天下安中國者數百年季世一失其道而亡如此其忽何也曰井法不立諸侯不建天下蕩蕩無綱紀也後世不改其轍欲如周獲天年終難矣哉三代而後漢唐之盛謂愛民而富民之君則有之謂愛民而教民之君則未之有也漢唐以來天下既定人君非因循自怠則沉溺聲色非沉溺聲色則開拓邉境非開拓邉境則崇飾虛文其下乃有惑於神仙真空之術曷若講明先王之道存其心正其情大其德新其政光其國為萬世之大君乎後世必有髙於漢唐賢君之聰明者然後能行之矣而漢唐賢君志趣識量亦未易及也可輕棄哉又况三代之盛王行一不義殺一不辜而得天下不為者其仁何可及乎人君聨屬天下以成其身者也內選於九族之親禮其賢者表而用之以聨屬其親外選於五方之人禮其英傑引而進之以聨屬其民是故賢者衆之表君之輔也不進其親之賢者是自賊其心腹也不進其民之賢者是自殘其四肢也殘賊之君鮮不覆亡哉事物之情以成則難以毁則易足之行也亦然升髙難就卑易舟之行也亦然泝流難順流易是故雅言難入而淫言易聽正道難從而小道易用伊尹之訓太甲曰有言逆於汝心必求諸道有言遜於汝志必求諸非道蓋本天下事物之情而戒之耳非謂太甲質凡而故告之以如是也英明之君能以是自戒則德業日新可以配天矣聖人理天下以萬物各得其所為至極井田封建其大法也暴君汚吏既已廢之明君良臣歷千五百餘歲未有能復之者智不及耶才不逮耶聖道不傳所謂明君良臣者未免以天下自利無意於裁成輔相使萬物各得其所耶探視聽言動無息之本可以知性察視聽言動不息之際可以㑹情視聽言動道義明著孰知其為此心視聽言動物欲引取孰知其為人欲是故誠成天下之性性立天下之有情交天下之動心妙性情之德性情之德庸人與聖人同聖人妙而庸人之所以不妙者拘滯於有形而不能通爾今欲通之非致知何適哉至親至切者其仁之義也歟至通至達者其義之理也歟人備萬物賢者能體萬物故萬物為我用物不備我故物不能體我我應不為萬物役而反為萬物役者其不智孰甚焉行吾仁謂之恕操吾心謂之敬敬以養吾仁非性無物非氣無形性其氣之本乎釋氏窺見心體故言為無不周遍然未知止於其所故外倫理而妄行不足與言孔孟之道也明乾坤變化萬物受命之理然後信六道輪回之說真詖淫邪遁之詞始可與為善矣氣之流行性為之主性之流行心為之主釋氏有適而可有適而不可吾儒無可無不可人能自强於行履之地則必不假釋氏淫遁之詞以自殆矣釋氏惟明一心亦可謂要矣然真孔子所謂好仁不好學者也不如是豈其愚至於無父無君而不自知其非也哉物無非我事無非真彼遺棄人間萬務惟以了死生為大者其蔽孰甚焉氣感於物發如奔霆狂不可制惟明者能自反惟勇者能自斷行之失於前者可以改之於後事之失於今者可以修之於來雖然使行而可以逆制則人皆有善行矣使事而可以豫立則人皆有善事矣惟造次不可以少待也惟顛沛不可以少安也則行失於身事失於物有不可勝窮者矣雖强力之人改過不憚其如過之不窮何是以大學之方在致其知知至然後意誠意誠則過不期寡而寡矣事之誤非過也或未得馭事之道焉耳心之惑乃過也心過難改能改心過則無過矣能攻人實病者至難也能受人實攻者為尤難人能攻我實病我能受人實攻朋友之義其庶幾乎不然其不相陷而為小人者幾希矣忌克之人其可事乎其急也我諫我聽我才我用禍既息矣我諫謗也我才姦也殺我必矣有天下國家而如是能傳之子孫者未之有也是故不忌不克可以為君矣諫不妄發才不妄試可以保身矣喪之三年也盡生者之孝心也於死者何加損焉是故漢文雖有命短喪我謂之天下之慈君而漢景不服三年之喪其為孝也薄矣行而有悖於天有纍於身雖有父令不可從也從之則成父之小欲而隳父之大仁君子不謂之孝况三年之喪仁人孝子所以事天成身之本非父之所得令者乎後世不罪漢景之薄於親而罪漢文之慈於臣子是未察乎喪服之志者也欲大變後世之法度必先大變人主之心術心術不正則不能用真儒為大臣大臣非真儒則百官不可總已以聽而嗣君不可以三年不言母后雖欲順承天意不撓外權不可得矣此不可不大變之本也本正則自身措之百官萬民而天下皆正矣荀子曰有治人無治法竊譬之欲撥亂反之正者如越江湖法則舟也人則操舟者也若舟破楫壞雖有若神之技人人知其弗能濟矣故乘大亂之時必變法法不變而能成治功者未之有也欲撥亂興治者當正大綱知大綱然後本可立而末可定大綱不知雖或善於條目有一時之功終必於大綱不正之處而生大亂然大綱無定體各隨其時事故魯莊之大綱在於復讎也衛國之大綱在於正名也讎不復名不正雖有仲尼之德亦不能聽魯衛之政矣行紛華波動之中慢易之心不生居幽獨得肆之處非僻之情不起上也起而以禮制焉次也制之而不止者昏而無勇也理不素窮勇不自任必為小人之歸可恥之甚也堯舜以天下與人而無人德我之望湯武有人之天下而無我取人之嫌是故天下無大事我不能大則以事為大而處之也難矣人欲盛則天理昏理素明則無欲矣處富貴乎與天地同其通處貧賤乎與天地同其否安死順生與天地同其變化又何宫室妻妾衣服飲食存亡得喪而以介意乎一身之利無謀也而利天下者則謀之一時之利無謀也而利萬世者則謀之存斯志行斯道躬耕於野上以奉祀事長下以慈幼延交游於身足矣易曰不家食吉是有命焉烏能舍我靈龜而逐人之昏昏也仁者人所以肖天地之機要也人之於天地有感必應猶心之於身疾痛必知焉物不獨立必有對對不分治必交焉而文生矣物盈於天地之間仁者無不愛也故以斯文為己任理萬物而與天地參矣或問王通曰子有憂疑乎通曰樂天知命吾何憂窮理盡心吾何疑雖然天下皆憂吾獨得不憂天下皆疑吾獨得不疑又曰心迹之判久矣吾獨得不二言乎或問曰通有二言何也曰仁則知通之言一不仁則以通言為二若心與迹判則是天地萬物不相管也而將何以一天下之動乎天下莫大於心患在不能推之爾莫久於性患在不能順之爾莫成於命患在不能信之爾不能推故人物內外不能一也不能順故死生晝夜不能通也不能信故富貴賤貧不能安也事物屬諸性君子不謂之性也必有心焉而後能治裁制屬諸心君子不謂之心也必有性焉然後能存不仁則見天下之事大而執天下之物固故物激而怒怒而不能消矣感物而欲欲而不能止矣窮理盡性以成吾仁則知天下無大事而見天下無固物雖有怒怒而不遷雖有欲欲而不淫矣莊周曰伯夷死名於首陽之下非知伯夷者也若伯夷可謂全其性命之情者矣謂之死名可乎周不為一世用以保其身可矣而未知天下之大本也智不相近雖聽言而不入信不相及雖納忠而不受是故君子必慎所以言則不招謗誹取怨辱矣士學於文而知道則關鍵節目之言未嘗不三復也君學於政而知道則幾㑹本原之事未嘗不三令五申也知之則因非而知是不知則指是以為非人君盡下則聰明開而萬里之逺親於衽席偏信則昏亂而父子夫婦之間有逺於萬里者矣人君欲救偏信之禍莫先於窮理莫要於寡欲窮理寡欲交相發者矣去聖既逺天下無人師學者必因書記語言以知理義之精微知之則適理義之周道也不然則為溺心志之大穽矣人盡其心則可與言仁矣心窮其理則可與言性矣性存其誠則可與言命矣敬則人親之仁則民愛之誠則鬼神享之窮則獨善其身達則兼善天下者大賢之分也達則兼善天下窮則兼善萬世者聖人之分也或問人可勝天乎曰人而天則天勝人而不天則天不勝學貴大成不貴小用大成者參於天地之謂也小用者謀利計功之謂也人者天地之精也故行乎其中而莫禦五行萬物之秀氣故物為之用而莫違三王正名興利者也故其利大而流長五伯假名爭利者也故其利小而流近形形之謂物不形形之謂道物拘於數而有終道通於化而無盡古之學者求天知今之學者求人知古之仕者行己今之仕者求利焉爾
