body:
  text: 知言卷二宋胡宏撰好惡性也小人好惡以己君子好惡以道察乎是而天理人欲可知志仁則可大依仁則可久仲尼從心所欲不踰矩可謂盡心矣天即孔子也孔子即天也釋氏無障礙而所欲不能不踰矩吾知其未見心之全也猖狂妄行而已有其德無其位君子安之有其位無其功君子恥之君子之逰世也以德故不患乎無位小人之逰世也以利勢故患得患失無所不為一噓吸足以察寒暑之變一語默足以著行藏之妙一往來足以究天地之理自陋者不足以與言也自小者不足與有為也人雖備夫道必學然後識習然後能能然後用用無不利惟樂天者能之有之在己知之在人有之而人不知從而與人較者非能有者也水有源故其流不窮木有根故其生不窮氣有性故其運不窮德有本故其行不窮孝悌也者德之本歟有是心則有知無是心則無知巧言令色之人一失其心於浮偽未有能仁者也等級至嚴也失禮樂則不威山河至險也失禮樂則不固禮乎樂乎天下所日用不可以造次顛沛廢焉者乎富可以厚恩貴可以廣德是君子之所欲也有求之而得者有不求而得者有求之而不得者命有定矣信而不渝然後能為君子有為之為出於智巧血氣方盛則知巧出焉血氣既衰則知巧窮矣或知功之可利而鋭於立功或知名之可利而進以求名或知正直之可利而勉於正直或知文詞之可利而習於文詞皆智巧之智也上好恬退則為恬退以中其欲上好剛徑則為剛徑以中其欲上好溫厚則為溫厚以中其欲上好勤恪則為勤恪以中其欲上好文雅則為文雅以中其欲皆智巧之巧也年方壯則血氣盛得所欲則血氣盛壯邁欲失則血氣挫折消懦而所為屈矣無不可變之操也無為之為本於仁義善不以名而為功不以利而動通於造化與天地相終始茍不至德則至道不凝焉聖人不可得而見矣其遺言猶龍之蛻猶虎之皮用其文章猶足動觀聽况能充其蛻復其皮得其精神以設教於天下其撥亂興治如反覆手耳不得其道與天下之人角智力者嵲嵲乎殆哉有聚而可見謂之有者知其有於目故散而不可見者謂之無有實而可蹈謂之有者知其有於心故妄而不可蹈者謂之無馬牛人畜也御之失道則奮其角踶雖有猛士莫之敢攖得其道則三尺童子用之周旋無不如志焉天下分裂兆民離散欲以一之固有其方患在人不仁雖與言而不入也知幾則物不能纍而禍不能侵不纍於物其知幾乎郡縣天下可以持承平而不可以支變故封建諸侯可以持承平可以支變故自觀我者而言事至而知起則我之仁可見也事不至而知不起則我之仁不可見也自我而言心與天地同流夫何間之有寡欲之君然後可以言王道無欲之臣然後可以言王佐處已有道則行艱難險厄之中無所不利失其道則有不能堪而忿欲興矣是以君子貴有德也或往或來天之所以為道也或語或默士之所以為仁也或進或退臣之所以事君也或擒或縱兵之所以為律也或弛或張王之所以成化於天下也釋氏以盡虛空沙界為吾身大則大矣而以父母所生之身為一塵剎幻化之物而不知敬焉是有間也有間者至不仁也與區區於一物之中沈惑而不知反者何以異性譬諸水乎則心猶水之下情猶水之瀾欲猶水之波浪即物而真者聖人之道也談真離物者釋氏之幻也釋氏見理而不窮理見性而不盡性故於一天之中分别幻華真實不能合一與道不相似也當爵祿而不輕行道德而不舍者君子人歟君子人也天下之臣有三有好功名而輕爵祿之臣是人也名得功成而止矣有貪爵祿而昧功名之臣是人也必忘其性命矣鮮不及哉有由道義而行之臣是人也爵位功名得之不以為重失之不以為輕顧吾道義如何耳君天下臨百官是三臣者雜然並進為人君者烏乎知而進退之孟子曰君仁莫不仁有善行而不仁者有矣未有不仁而能擇乎善者也子思子曰率性之謂道萬物萬事性之質也因質以致用人之道也人也者天地之全也而何以知其全乎萬物有有父子之親者焉有有君臣之統者焉有有報本反始之禮者焉有有兄弟之序者焉有有救災恤患之義者焉有有夫婦之别者焉至於知時禦盜如雞犬猶能有功於人然謂之禽獸而人不與為類何也以其不得其全不可與為類也夫人雖備萬物之性然好惡有邪正取舍有是非或中於先或否於後或得於上或失於下故有不仁而入於蠢頑禽獸之性者矣惟聖人既生而知之又學以審之盡人之性盡物之性德合天地心統萬物故與造化相參而王斯道也不然各適其適雜於蠢頑禽獸是異類而已豈人之道也哉是故君子必戒慎恐懼以無失父母之性自别於異類期全而歸之以成吾孝也中者道之體和者道之用中和變化萬物各正性命而純備者人也性之極也故觀萬物之流行其性則異察萬物之本性其源則一聖人執天之機惇敘五典庸秩五禮順是者章之以五服逆是者討之以五刑調理萬物各得其所此人之以為天地也胡子喟然歎曰至哉吾觀天地之神道其時無愆賦命萬物無大無細各足其分太和保合變化無窮也凡人之生粹然天地之心道義完具無適無莫不可以善惡辨不可以是非分無過也無不及也此中之所以名也夫心宰萬物順之則喜逆之則怒感於死則哀動於生則樂欲之所起情則隨之心亦放焉故有私於身蔽於愛動於氣而失之毫釐繆以千里者矣衆人昏昏不自知覺方且為善惡亂方且為是非惑惟聖人超拔人羣之上處見而知隱由顯而知微靜與天同德動與天同道和順於萬物渾融乎天下而無所不通此中和之道所以聖人獨得民鮮能久者也為君子者奈何戒慎乎隱微恭敬乎顛沛勿忘也勿助長也則中和自致天髙地下而位定萬物正其性命而並育成位乎其中與天地參矣目之所可覩者禽蟲獸皆能視也耳之所可聞者禽蟲獸皆能聞也視而知其形聽而知其聲各以其類者亦禽獸之所能也視萬形聽萬聲而兼辨之者則人而已覩形色而知其性聞聲音而達其義通乎耳目之表形器之外則非聖人不能與於斯矣斯道不明則楊朱墨翟之賢而有禽獸之纍惟安於耳目形器不知覺之過也君子履安佚之地當安佚之時戒慎恐懼不敢須臾怠者以此君子畏天命順天時故不行驚衆駭俗之事而常中小人不知天命以利而動肆情妄作故行驚衆駭俗之事必其無忌憚而然也首萬物存天地謂之正性備萬物參天地謂之正道順秉彝窮物則謂之正教道之明也道之行也我知之矣變動不居進退無常妙道精義未嘗須臾離也賢者之行智者之見常髙於俗而與俗立異不肖者之行愚者之見常溺於俗而與俗同流此道之所以不明也此道之所以不行也我知聖人之行聖人之見矣不與俗同不與俗異變動不居進退無常妙道精義未嘗須臾離也參於天地造化萬物明如日月行如四時我知聖人之行聖人之見矣仲尼之教猶天地造化萬物生生日新無一氣之不應無一息之或已也我於季路而見焉或曰何謂也曰子路衣敝緼袍與衣狐貉者立而不恥者其質美矣孔子曰不忮不求何用不臧進之以仁也季路終身誦之力行乎仁矣孔子曰是道也何足以臧至哉斯言非天下之誠其孰能與於此顔回欲罷不能未至文王純亦不已之地孔子所以惜之曰未見其止也止則與天為一無以加矣氣主乎性性主乎心心純則性定而氣正氣正則動而不差動而有差者心未純也告子不知心而以義為外無主於中而主於言言有不勝則惑矣而心有不動乎北宫黝孟施舍以氣為本以果為行一身之氣有時而衰而心有不動乎曽子孟子之勇原於心在身為道處物為義氣與道義周流融合於視聽言動之間可謂盡心者矣夫性無不體者心也孰能參天地而不物關百聖而不惑亂九流而不謬乘富貴而能約遭貧賤而能亨禮儀三百威儀三千周旋繁縟而不亂乎人皆有良心故被之以桀紂之名雖匹夫不受也夫桀紂萬乘之君而匹夫羞為之何也以身不親其奉而知其行醜也王公大人一親其奉喪其良心處利勢之際臨死生之節貪冒茍免行若犬鼠皆是也富貴而奉身者備斬良心之利劍也是故大禹菲飲食卑宫室孔子重贊之曰吾無間然矣夫富貴一時之利良心萬世之彝乘利勢行彞章如雷之震如風之動聖人性之君子樂焉不然乃以一時之利失萬世之彝自列於禽獸寧貧賤而為匹夫不願王公之富貴也以理義服天下易以威力服天下難理義本諸身威力假諸人者也本諸身者有性假諸人者有命性可必而命不可必性存則命立而權度縱釋在我矣是故善為國者尊吾性而已君子有宰天下之心裁之自親始君子有善萬世之心行之自身始不然則蕩而無止不入於釋氏之寂滅則入於老莊之荒唐心無乎不在本天道變化為世俗酬酢參天地備萬物人之為道至大也至善也放而不知求耳聞目見為己蔽父子夫婦為己纍衣裘飲食為己欲既失其本矣猶皆曰我有知論事之是非方人之短長終不知其陷溺者悲夫故孟子曰學問之道無他求其放心而已矣有德而富貴者乘富貴之勢以利物無德而富貴者乘富貴之勢以殘身富貴人之所大欲貧賤人之所大惡然因貧賤而修益者多因富貴而不失於昏淫者寡則富貴也有時而不若貧賤矣赤子不私其身無智巧無偏係能守是心而不失然後謂之大丈夫唯仁者為能所執無非禮所行無非義今之儒者移學文藝干仕進之心以收其放心而美其身則又何古人之不可及哉父兄以學文藝令其弟子朋友以仕進相招往而不反則心始荒而不治萬事之成咸不逮古先矣學欲博不欲雜守欲約不欲陋雜似博陋似約學者不可不察也修為者必有棄然後能有所取必有變然後能有所成雖天子之貴不仁不義不能以尊其身雖天下之大不仁不義不能以庇其身况其下者乎魚生於水死於水草木生於土死於土人生於道死於道天經也飲食車馬衣裘宫室之用道所有以濟生者猶魚有蘋藻泥沙草木有雷風雨露也如使魚而離水雖有蘋藻泥沙則不能生矣如使草木而離土雖有雷風雨露亦不能以生矣今人也而離道飲食雖豐裘服雖鮮車馬雖澤宫室雖麗其得而享諸季世淫亂並興爭奪相殺殄滅人倫至於善良被禍姦惡相殘天下囂然皆失其所則一人棄道崇物之所致也有國家者戒之戒之養太子不可以不慎也望太子不可以不仁也
