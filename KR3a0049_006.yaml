body:
  text: 知言卷六宋胡宏撰易詩書春秋今有其名耳其道未嘗知也知之然後徳進業修而其道可行矣公卿大夫士今有其名耳其位未嘗定也位定然後才可盡職可修而天下可理矣易詩書春秋者聖人之道也聖人之道若何曰聖人者以一人理億兆人之徳性息其争奪遂其生養者也天地聖人之父母也聖人天地之子也有父母則有子矣有子則有父母矣此萬物之所以著見道之所以名也非聖人能名道也有是道則有是名也聖人指名其體曰性指名其用曰心性不能不動動則心矣聖人𫝊心教天下以仁也誠者天之道也心涵造化之妙則萬物畢應彼夫懐之以恩令之以義憚之以威結之以信者末矣易曰雲從龍風從虎此之謂也人君不可不知乾道不知乾道是不知君道也君道如何曰天行健人君不可頃刻忘其君天下之心也如天之行一息或不繼則天道壊矣均是人也有一人而生養千萬人者有千萬人而生養於一人者大易天火之卦六二中正之人也九五亦中正之人也一人而同於一人孔子曰二人同心其利斷金不言五失君道不同於天下者是一人者所賴以生養天下同天下之本也故孔子曰同心之言其臭如蘭堯之於舜舜之於禹禹之於益成湯之於伊尹髙宗之於傅説武王之於周公仲尼之於顔回先主之於武侯是也雖然二柔者也故有私暱之戒君者天之道也臣者地之道也君道必謙恭盡下則臣可以上納其忠是故天下地上而為泰天上地下而為否成象之謂乾效法之謂坤君意不先動而臣先之是謂失道道失於初求欲有終難矣故知道之臣寧有死於其分而無犯分以徼功也古者舉士於鄉自十年出就外傅學於家塾州序其學者何事也曰六禮也七教也八政也書其資性近道才行合理鄉老鄉吏㑹合鄉人於春秋之祭祀鬼神而書之者也三嵗大比鄉老鄉吏及鄉大夫審其性之不悖於道也行之不反於理也質其書之先後無變也乃入其書於司徒謂之選士選士學於鄉校其書之如州序三嵗大比鄉大夫及司徒審之如初乃入其書於樂正謂之俊士俊士入國學春秋教以禮樂冬夏教以詩書以上觀古道樂正官屬以時校其業之精否而勉勵之三嵗大比樂正升其精者於王謂之進士王命冡宰㑹天下之進士論其資性才行學業某可以為卿歟某可以為大夫歟某可以為士歟卿闕則以可以為卿者補之大夫闕則以可以為大夫者補之士有闕則以可以為士者補之三年一考其績三考黜其不職陟其有功者是故朝無幸官野無遺賢毁譽不行善惡不眩徳之大小當其位才之髙下當其職人務自修而不僥倖於上人知自守而不冒昧求進人知自重而不輕用其身人能有恥而不茍役於利此所以仕路清政事治風俗美天下安寜四夷慕義而疆埸不聳也後之取士反此分天下有徳有功者以地而不敢以天下自私於是有百里七十里五十里不能五十里邦國之制焉於是有君朝卿大聘大夫小聘王巡守述職之禮樂法度焉於是有千雉百雉三之一五之一九之一之髙城深池焉於是有井邑丘甸縣都之夫數焉於是有十乗百乘千乘萬乘之車數焉於是有伍兩卒旅師軍之制焉於是有卿大夫司徒樂正取士之法焉邦國之制廢而郡縣之制作矣郡縣之制作而世襲之制亡矣世襲之制亡而數易之弊生矣數易之弊生而民無定制矣巡守述職之禮廢上下之情不通攷文案而不究事實信文案而不任仁賢其弊有不可勝言者矣城池之制廢而禁禦暴客威服四夷之法亡矣夫家之法廢則民數不可詳矣民數不可詳而車乘不可出矣車乘不可出而軍師不隠於農矣軍師不隠於農坐食者衆而公私困窮矣學即行也非禮勿視聴言動學也行之也行之行之而又行之習也習之不已理與神㑹能無悦乎學行之上也知之次也教人又其次也是以識前言徃行為學而已矣揚雄何其陋之甚也此大駮也非小疵也七雄諸侯皆自稱王以為王歟則土無二王四海之内安得王而七也以為侯歟則地皆千餘里普天之下安得侯而七也王非王侯非侯立位不正此孔孟之所以難仕然而仕者將以行其正也不可正則去矣孔門諸子有仕大夫之家有不仕大夫之家者大夫之家可以仕可以無仕者也何謂可以仕君臣之義不可廢故也何謂可以無仕知其不可教故也故冉求不能改季氏之徳孔子所以欲鳴鼓而攻之也利建侯者文王之所以著於屯之彖也所以著於豫之彖也冝建侯者孔子所以著於屯之象也利建侯者周公之所以著於屯之爻也先王以建萬國親諸侯孔子所以著於比之大象也封建之法本於鴻荒之世羣雄之所以自立者也法始於黄帝成於堯舜夏禹因之至桀而亂成湯興而修之天下以安至紂而又亂文王武王興而修之天下亦以安至幽王而又亂齊桓晉文不能修而益壊之故天下紛紛不能定及秦始皇而掃滅之故天下大亂争起而亡秦猶反覆手於須㬰間也黄帝堯舜安天下非封建一事也然封建其大法也夏禹成湯安天下亦非封建一事也然封建其大法也文王武王安天下亦非封建一事也然封建其大法也齊桓晉文之不王非一事也然不能封建其大失也秦二世而亡非一事也然掃滅封建其大繆也故封建也者帝王之所以順天理承天心公天下之大端大本也不封建也者霸世暴主之所以縱人欲悖天道私一身之大孽大賊也今人聞黄帝堯舜禹湯文王武王則尊之貴之以為聖人聞齊桓晉文則訾之笑之以為霸者聞始皇胡亥則鄙之賤之以為小人之雄爾及聖人所行則不從而霸者暴人之所行則從之歴代不能改是何也弗思之甚也天地根於和日月星辰根於天山川草木根於地而人根於天地之間者也有其根則常而静安而久常静安乆則理得其終物遂其性故封建者政之有根者也故上下辨民志定教化行風俗美理之易治亂之難亡扶之易興亡之難滅郡縣反是聖人周萬務而無為故博施濟衆不期應於物而物應功用配天地悠久無疆而人道立矣命有窮通性無加損盡其性則至於命貴賤命也仁義性也
