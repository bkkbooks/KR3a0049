body:
  text: 䟦孟子以知詖淫邪遁為知言胡子之書以是名者所以辨異端之言與吾聖人異也楊墨之害不熄孔子之道不著故知言一書於諸子百家之邪説辭而闢之極其詳焉盖以繼孟子也學者誠能深味其㫖則於吾道之正且大異端之偏而小若辨白黒若數一二矣蕭君定夫以其所蔵真藁示余敬拜而書其後
