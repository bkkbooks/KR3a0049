body:
  text: 知言卷四宋胡宏撰一氣大息震蕩無垠海宇變動山勃川湮人消物盡舊迹亡滅是所以為鴻荒之世歟氣復而滋萬物化生日以益衆不有以道之則亂不有以齊之則争敦倫理所以道之也飭封井所以齊之也封井不先定則倫理不可得而敦堯為天子憂之而命舜舜為宰臣不能獨任憂之而命禹禹周視海内奔走八年辨土田肥瘠之等而定之立井牧多寡之制而授之定公侯伯子男之封而建之然後五典可敷而兆民治矣此夏后氏之所以王天下也後王才不出庶物大侵小强侵弱智詐愚禹之制浸隳浸紊以至於桀天下大亂而成湯正之明其等申其制正其封以復大禹之舊而人紀可修矣此殷之所以王天下也後王才不出庶物大侵小强吞弱智詐愚湯之制浸隳浸壊以至於紂天下大亂而周武王征之明其等申其制正其封以復成湯之舊而五教可行矣此周之所以王天下也後王才不出庶物大吞小强侵弱智詐愚武王之制浸隳浸亂先變於齊後變於魯大壊於秦而仁覆天下之政亡矣仁政既亡有天下者漢唐之盛其不王也人也非天也其後亡天也非人也噫孰謂而今而後無繼三王之才者乎病在世儒不知王政之本議三王之有天下不以其道而反以亡秦為可法也聖人之應事也如水由於地中未有可止而不止可行而不行者也有而不能無者性之謂與宰物不死者心之謂與感而無息者誠之謂與徃而不窮者鬼之謂與來而不測者神之謂與一徃一來而無窮者聖人之天道也謂徃而復來來而復徃者釋氏之幻教也或問性曰性也者天地之所以立也曰然則孟軻氏荀卿氏揚雄氏之以善惡言性也非歟曰性也者天地鬼神之奥也善不足以言之况惡乎或者問曰何謂也曰宏聞之先君子曰孟子所以獨出諸儒之表者以其知性也宏請曰何謂也先君子曰孟子道性善善云者嘆美之詞不與惡對或問心有死生乎曰無死生曰然則人死其心安在曰子既知其死矣而問安在耶或曰何謂也曰夫惟不死是以知之又何問焉或者未逹胡子笑曰甚哉子之蔽也子無以形觀心而以心觀心則知之矣天理人欲莫明辨於春秋聖人教人消人欲復天理莫深切於春秋伯夷非絶物者也惡不仁而已故清而不介栁下恵非徇俗者也行吾敬而已故和而不流大哉性乎萬理具焉天地由此而立矣世儒之言性者類指一理而言爾未有見天命之全體者也凡天命所有而衆人有之者聖人皆有之人以情為有累也聖人不去情人以才為有害也聖人不病才人以欲為不善也聖人不絶欲人以術為傷徳也聖人不棄術人以憂為非逹也聖人不忘憂人以怨為非𢎞也聖人不釋怨然則何以别於衆人乎聖人發而中節而衆人不中節也中節者為是不中節者為非挾是而行則為正挾非而行則為邪正者為善邪者為惡而世儒乃以善惡言性邈乎遼哉萬物皆性所有也聖人盡性故無棄物情一流則難遏氣一動則難平流而後遏動而後平是以難也察而養之於未流則不至於用遏矣察而養之於未動則不至於用平矣是故察之有素則雖嬰於物而不惑養之有素則雖激於物而不悖易曰艮其背不獲其身行其庭不見其人无咎此之謂也誠天道也人心合乎天道則庶幾於誠乎不知天道是冥行也㝠行者不能處己烏能處物處物失道而曰誠吾未之聞也是故明理居敬然後誠道得天道至誠故無息人道主敬所以求合乎天也孔子自志學至於從心所欲不踰矩敬道之成也敬也者君子之所以終身也義理羣生之性也義行而理明則羣生歸仰矣敬愛兆民之心也敬立而愛施則人心誠服矣感應鬼神之情性也誠則能動而鬼神來格矣祖考為諸侯子孫為大夫士祖考為諸侯其𦵏也固諸侯其祭也亦必以諸侯不以子孫為大夫士而降也子孫為大夫士其𦵏也固大夫士其祭也亦必以大夫士不以祖考為諸侯而僣也是故杞宋之諸侯得郊而春秋以諸侯𦵏焉斯可見矣處之以義而理得則仁不亂臨之以敬而愛行則物不争守之以正行之以中則事不悖而天下理矣合以義正合也理不得不合也不得不合而合天與人一矣合不以義茍合也君子不為也為天下者必本於理義理也者天下之大體也義也者天下之大用也理不可以不明義不可以不精理明然後綱紀可正義精然後權衡可平綱紀正權衡平則萬事治百姓服四海同夫理天命也義人心也惟天命至微惟人心好動微則難知動則易亂欲著其微欲静其動則莫過乎學矣學之道莫過乎繹孔子孟軻之遺文孔子定書刪詩繫易作春秋何區區於空言所以上承天意下憫斯人故丁寧反復三四不倦使人知所以正心誠意修身齊家治國平天下之本也孟軻氏閑先聖之道慨然憂世見齊梁之君開陳理義提世大綱一掃東周五霸之弊發興衰撥亂之要愚因其言上稽三代下攷兩漢三國東西晉南北朝至于隋唐以及五代雖成功有小大為政有治忽制事有優劣然摠其大畧其興隆也未始不由奉身以禮義其敗亡也未始不由肆志於利欲然後知孟軻氏之言信而有徴其𫝊聖人之道純乎純者也性定則心宰心宰則物隨物欲不行則志氣清明而應變無失隂陽升降有道剛柔屈伸有理仁義進退有法知道者可與論政知理者可以謀事知法者可與取人知道者理得知理者法得是以君子貴知道也彪居正問心無窮者也孟子何以言盡其心曰惟仁者能盡其心居正問為仁曰欲為仁必先識仁之體曰其體如何曰仁之道𢎞大而親切知者可以一言盡不知者雖設千萬言亦不知也能者可以一事舉不能者雖指千萬事亦不能也曰萬物與我為一可以為仁之體乎曰子以六尺之軀若何而能與萬物為一曰身不能與萬物為一心則能矣曰人心有百病一死天下之物有一變萬生子若何而能與之為一居正悚然而去他日問曰人之所以不仁者以放其良心也以放心求心可乎曰齊王見牛而不忍殺此良心之苖裔因利欲之間而見者也一有見焉操而存之存而養之養而充之以至于大大而不已與天同矣此心在人其發見之端不同要在識之而已皇皇天命其無息也體之而不息者聖人也是故孔子學不厭教不倦顔子希夫子欲罷而不能孟子承先聖周旋而不舍我知其久於仁矣禮文多者情實必不足君子交際宜察焉言詞巧者臨斷必不善君子選用宜察焉専好毁者其心必不良烏能惡不仁人事有是非天命不囿於是非超然於是非之表然後能平天下之事也或是或非則在人矣雖聖人不能免也久則白萬物不同理死生不同狀窮理然後能一貫也知生然後能知死也人事之不息天命之無息也人生在勤勤則身脩家齊國治天下平雖然勤於道義則剛健而日新故身修家齊國治天下平也勤於利欲則放肆而日怠終不能保其身矣禹湯文武丹朱桀紂可以為鑒戒矣貴為天子富有天下尚不能保其躬也而况公卿大夫士庶人乎天下有二難以道義服人難難在我也以勢力服人難難在人也由道義而不舍禁勢力而不行則人心服天下安一日之早暮天地之始終具焉一事之始終鬼神之變化具焉察人事之變易則知天命之流行矣人之生也良知良能根於天拘於己汨於事誘於物故無所不用學也學必習習則熟熟則久久則天天則神天則不慮而行神則不期而應孝也者為仁之本也仁也者大學之本也學者志於仁必求所以為仁故子游子夏問孝皆初學之時也將相無異任文武無異道其異也後世之人未嘗學也孔子十五而志於學何學也曰大學也所以學修身齊家治國平天下之道也孔子三十而立何立也曰居天下之廣居立天下之正位行天下之大道不退轉也孔子四十而不惑何不惑也曰富貴不能淫貧賤不能移威武不能屈卓然立乎萬物之表也孔子五十而知天命何知也曰元亨利貞乾之四徳行之昭明浩然與萬物同流處之各得其分而不亂也孔子六十而耳順如何耳順也曰所過者化所存者神幾於天矣孔子七十而從心所欲不踰矩何不踰也曰以其動也天故也子貢曰夫子之得邦家者所謂立之斯立道之斯行綏之斯來動之斯和非天能如是乎嗚呼此伏羲神農黄帝堯舜禹湯文武周公孔子孟軻氏之學立天地之經成萬物之性者也然則請問大學之方可乎曰致知請問致知曰致知在格物物不格則知不至知不至則意不誠意不誠則心不正心不正而身修者未之有也是故學為君子者莫大於致知彼夫隨衆人耳目聞見而知者君子不謂之知也自髙則必危自滿則必溢未有髙而不危滿而不溢者也是故聖人作易必以天在地下為泰必以損上益下為益陽中有隂隂中有陽陽一隂隂一陽此太和之所以為道也始萬物而生之者乾坤之元也物正其性萬古不變故孔子曰成之者性允恭者帝堯也温恭者大舜也懿恭者文王也恭而安者孔子也克儉于家者舜之所以美大禹也慎乃儉徳者伊尹之所以訓太甲也恭儉惟徳者成王之所以戒百官也陳文子之時天下無王政自諸侯出諸侯又不自為政政自大夫出滔滔者天下皆是也仁者處斯世必思有以易天下因汙隆而起變化無可無不可也陳文子則不然乃幾至無所容其身則可謂有知乎故孔子曰未知焉得仁春秋之時天下無王楚古之建國也子文輔佐楚成曾不知首出庶物之義安於僭竊以荆楚而侵陵諸夏與齊桓宋襄晉文争衡務强大以濟其私欲而已則可謂有知乎故孔子曰未知焉得仁春秋之時周平不天禮樂征伐自諸侯出既而諸侯不自為政禮樂征伐自大夫出夫能出禮樂征伐者皆天下之賢諸侯賢大夫也子繼厥父孫繼厥祖自以為能子能孫人亦以為孝悌之人矣曽不察其所行動皆犯上之事陵夷至於作亂而不自知未有一人能承天命由仁義行者也故有子本仁而言以正一世之失其㫖深且逺矣此孔子春秋之所以作也仁者臨機發用而後見不可預指故季路冉有公西華之仁孔子不得而言也孟武伯不知仁故又問孔子各以其材答之夫學於聖門者皆以為仁為本三子者今之所能若是後日之進未已也其進未已雖聖人安得而預言之故孔子曰不知其仁趙幼翁言學胡子曰學道者正如學射纔持弓矢必先知的然後可以積習而求中的矣若射者不求知的不求中的則何用持弓矢以射為列聖諸經千言萬語必有大體必有要妙人自少而有志尚恐奪於世念日月蹉􅋸終身不見也若志不在於的茍欲玩其辭而已是謂口耳之學曽何足云夫滯情於章句之末固逺勝於博奕戲豫者矣特以一斑自喜何其小也何不志於大體以求要妙譬如遊山必上東岱至於絶頂坐使天下髙峰逺岫卷阿大澤悉來獻狀豈不偉歟幼翁曰我習敬以直内可乎胡子曰敬者聖門用功之妙道也然坤卦之義與乾相䝉敬以直内者終之之方也茍知不先至則不知所終譬如將適一所而路有多岐莫知所適則敬不得施内無主矣内無主而應事物則未有能審事物之輕重者也故學聖人之道者必先致知及超然有所見乃力行以終之終之之妙則在其人他人不得而與也人心應萬物如水照萬象應物有誠妄當其可之謂誠失其宜之謂妄物象有形影實而可用之謂形空而不可用之謂影儒者之教踐形釋氏之教逐影影不能離乎形者也是故聴其言則是稽其行則非唯髙明篤實之君子乃知釋氏之妄大有害於人心聖王復起必不棄中華之人使入於異端也
