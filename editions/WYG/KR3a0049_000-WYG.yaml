body:
  text: 提要知言六卷附録一卷儒家類臣等謹案知言六卷附録一卷宋胡宏撰宏有皇王大紀巳著録是編乃其論學之語隨筆劄記屢經改訂而後成吕祖謙嘗以為勝於正䝉然宏之學本其父安國安國之學雖出於楊時而又兼出於東林常總總嘗謂本然之性不與惡對言安國沿習其説遂以本然者與善惡相對者分成兩性宏作此書亦仍守其家𫝊其所謂性無善惡心以成性天理人欲同體異用同行異情指名其體曰性指名其用曰心性不能不動動則心矣云云朱子力詆其非至作知言疑義與吕祖謙及宏門人張栻互相論辨即栻亦不敢盡以其師説為然其論治道以井田封建為必不可廢亦泥古而流於迂謬然其他實多明白正大足以闡正學而闢異端朱子亦嘗稱其思索精到處殊不可及固未可以一二瑕疵盡廢其書也自元以來其書不甚行於世明程敏政始得舊本於呉中後坊賈遂有刋板然明人𫝊刻古書好意為竄亂此本亦為妄人强立篇名顛倒次序字句舛謬全失其真惟永樂大典所載尚屬宋槧原本首尾完偹條理釐然謹据其章目詳加刋正以復其舊其朱子語類各條亦仍依原本别為附録一卷繫之於末以備考證焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀原序知言五峯先生之所著也先生諱宏字仁仲文定公之季子也自㓜志於大道嘗見楊中立先生於京師又從侯師聖先生於荆門而卒傳文定公之學優㳺南山之下餘二十年玩心神明不舎晝夜力行所知親切至到析太極精㣲之藴窮皇王制作之端綜事物於一原貫古今於一息指人欲之偏以見天理之全即形而下者而發無聲無臭之妙使學者驗端倪之不逺而造髙深之無極體用該備可舉而行晩歲嘗被召㫖不幸寢疾不克造朝而卒是書乃其平日之所著其言約其義精誠道學之樞要制治之蓍龜也然先生之意每自以為未足逮其疾革猶時有所更定蓋未及脱藁而己啟手足矣或問於栻曰論語一書未甞指言性而子思中庸獨於其首章一言之至於孟子始道性善然其為説則已簡矣今先生是書於論性特詳焉無乃與聖賢之意異乎栻應之曰無以異也夫子雖未嘗指言性而子貢蓋嘗識之曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也是豈真不可得而聞哉蓋夫子之文章無非性與天道之流行也至孟子之時如楊朱墨翟告子之徒異説並興孟子懼學者之惑而莫知所止也於是指示大本而極言之蓋有不得已焉耳矣又况今之異端直自以為識心見性其譸張雄誕又非當時之比故髙明之士往往樂聞而喜趨之一溺其間則喪其本心萬事隳弛毫釐之差霄壤之謬其禍蓋有不可勝言者先生於此又烏得而忘言哉故其言有曰誠成天下之性性立天下之有情效天下之動而必繼之曰心妙性情之德又曰誠者命之道乎中者性之道乎仁者心之道乎而必繼之曰惟仁者為能盡性至命夫學者誠能因其言而精察於視聽言動之間卓然知夫心之所以為妙則性命之理蓋可黙識而先生之意所以不異於古人者亦可得而言矣若乃不得其意而徒誦其言不知求仁而坐談性命則幾何其不流於異端之歸乎栻頃獲登門道義之誨浹洽於中自惟不敏有負夙知輙序遺書貽於同志不韙之罪所不得而辭焉乾道四年三月丙寅門人張栻序
