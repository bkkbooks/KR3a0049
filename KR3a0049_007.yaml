body:
  text: 知言附録東萊云知言勝似正蒙先生曰蓋後出者巧也做出那事便是這裏有那理凡天地生出那物便都是那裏有那理五峰謂性立天下之有說得好情效天下之動效如效死效力之效是自力形出也五峯說心妙性情之德不是他曽去研窮深體如何直見得恁地仲思問五峯中誠仁如何曰中者性之道言未發也誠者命之道言實理也仁者心之道言發動之端也又疑道字可改為德字答曰亦可德字較緊然他是特地下此寬字伊川答與叔書中亦云中者性之德近之伯恭云知言勝正䝉似此等處誠然但不能純如此處爾又疑中誠仁一而已何必别言曰理固未嘗不同但他聖賢說那一箇物事時且隨處說他那一箇意思自是他一箇字中便有箇正意義如此不可混說聖賢書便不用許多了學者亦宜各隨他說處看之方見得他所說字本相如誠如中如仁若便只混看則下梢都看不出仲思問五峯云誠者命之道也中者性之道也仁者心之道也竊謂天之所以命乎人者實理是已故言誠者命之道若中者性之道如何曰未發時便是性仲思曰如此則是喜怒哀樂未發便是性既發便是情曰然此三句道得極密吕伯恭道知言勝似正䝉如這處也是密但不純恁地但道字不如德字曰所以程子云中者性之德為近之但言其自然則謂之道言其實體則謂之德德字較緊道字較寬但他故下這寬字不要挨拶著他又問言中則誠與仁亦在其內否曰不可如此看若可混併則聖賢已自混併了須逐句看他言誠時便主在實理發育流行處言性時便主在寂然不動處言心時便主在生發處李堯卿問誠者性之德此語如何先生曰何者不是性之德如仁義禮智皆性之德恁地說較不切不如胡氏誠者命之道乎說得較近傍李維申說合於心者為仁先生曰却是從義上去不如前日說存得此心便是仁却是因舉五峯胡氏語云人有不仁心無不仁說得極好又曰胡五峯云人有不仁心無不仁此說極好人有私欲遮障了不見這仁然心中仁依舊只在如日月本自光明雖被雲遮光明依舊在裏又如水被泥土塞了所以不流然水性之流依舊只在那裏譬如一箇鏡本自光明只緣塵都昏了若磨去塵光明只在五峯曰人有不仁心無不仁既心無不仁則巧言令色者是心不是如巧言令色則不成說道巧言令色底不是心别有一人巧言令色如心無不仁則孔子何以說回也其心三月不違仁蕭佐曰我欲仁斯仁至矣這箇便是心無不仁答曰回心三月不違仁如何說問者默然久之先生曰既說回心三月不違仁則心有違仁違仁底是心不是說我欲仁便有不欲仁底是心不是胡氏云格物則能知言誠意則能養氣問知言有云佛家窺見天機有不器於物者此語莫已作兩截曰亦無甚病此蓋指妙萬物者而不知萬物皆在其中聖人見道體正如對面見人其耳目口鼻髮眉無不見佛家如逺望人只見髣象初不知其人作何形狀問佛家既如此說而其說性乃指氣却是兩般曰渠初不離此說但既差了則自然錯入别處去道二仁與不仁而已矣猶今人言好底道理不好底道理相似若論正當道理只有一箇便無第二箇所謂夫道一而已矣者也因舉久不得胡季隨諸人書胡季隨主其家說性不可以善言本然之善本自無對才說善時便與那惡對矣才說善惡便非本然之性矣本然之性是上其尊無比故孟子道性善非是說性之善只是贊嘆之辭說好箇性如佛氏云善哉贊嘆之辭也此胡文定之說某嘗辨云本然之性固渾然至善不與惡對此天之賦我者然也然行之在人則有善有惡做得是者為善做得不是者為惡豈可謂善者非本然之性只是行於人者有二者之異然後見善者是那本然之性也若如其言本然之善又有善惡相對之善則是有二性矣方其得於天者此性也及其行得善者亦此性也只是才有個善者便有個不善底所以善惡須著對言不是元有個惡在那裏等待你來與你為對只是行得錯底便流入於惡矣此胡文定之說故其子孫皆主其說而致堂五峯以來其說並差遂成有兩性本然者是一性善惡相對者又一性他只說本然者是性善惡相對者不是性豈有此理然胡文定又得於龜山龜山得之東林總老名常總總老龜山鄉人龜山鄉里與之往來後來總住廬山東林龜山赴省又往見之總老聰明深通佛書有道行龜山問孟子道性善說得是否總老曰是又問性豈可以善惡言總曰本然之性不與惡對此語流𫝊自他然總老之言本亦未有病蓋本然之性是無惡及至胡文定以性善為贊嘆之辭到得胡致堂五峯輩遂分成兩截說善底不是性若善底非本然之性那處得這善來既曰贊嘆性好之辭便是性矣若非性善何贊嘆之有如佛氏曰善哉善哉為贊美之辭亦是這箇道理好所以贊嘆之也蘇氏論性亦是如此嘗言孟子之道性善猶火之能熟物也荀卿言性惡猶如火之能焚物也龜山反其說而辨之曰火之所以能熟物者以其能焚物故耳若火不能焚物何能熟東坡論性說自上古聖人以來至孔子不能已而說中說一未嘗分善惡言也故自孟子道性善而一與中始岐矣盡是胡說他更不看道理只認我說得行底便是諸胡之說亦然季隨至今守其家說因問文定却是卓然自立所謂非文王猶興者先生曰固是他資質好然在太學中也多聞先生師友之訓所以能然嘗得潁昌一士人忘其姓名學問多得此人警發後來為荆門軍教授龜山與之為代因此識龜山因龜山方識游謝不及識伊川自荆門軍教授入為國子博士出來便為湖北提舉是時上蔡宰本路一邑文定却從龜山求書見上蔡既到湖北遂遣人送書與上蔡既受書文定乃往見之入境人皆訝知縣不接監司論理上蔡既受他書也是難為出來接他既入縣遂先修後進禮見之畢竟文定之學後來得於上蔡者為多他所以尊上蔡而不甚滿於游楊二公看來游定夫後來也即當誠有不滿人意處頃嘗見游定夫集極說得醜差盡背其師說他更說伊川之學不如他之所得所以五峯臨終謂彪德美曰聖門工夫要處只在箇敬字游定夫所以卒為程門之罪人者以其不誠不敬故也誠如其言問性無善惡之說從何而始曰此出於常總總南劔人住廬山龜山入京嘗枉道見之留數月因問孟子識性否曰識曰何以言之曰善不與惡對言某觀他之意乃是謂其初只有善未有惡其後文定得之龜山遂差了今湖南學者信重知言又嘗謂敬夫辨析甚諱之渠當初倡道湖南偶無人能與辨論者可惜可惜又讀至於彪居正問心一段先生曰如何某謂不於原本處理㑹却些子發見曰孟子此事乃是一時間為齊王耳今乃欲引之以上他人之身便不是了良久云以放心求心便不是才知求心便已回矣安得謂之放因論湖湘學者崇尚胡子知言曰知言固有好處然亦大有差失如論性却曰不可以善惡辨不可以是非分既無善惡又無是非則是告子湍水之說爾如曰好惡性也君子好惡以道小人好惡以已則是以好惡說性而道在性外矣不知此理却從何而出問所謂探視聽言動無息之際可以㑹情此猶告子生之謂性之意否曰此語亦有病下文謂道義明著孰知其為此心物欲引誘孰知其為人欲便以道義對物欲却是性中本無道義逐旋於此處攙入兩端則是性亦可以不善言矣如曰性也者天地鬼神之奧也善不足以名之况惡乎孟子說性善云者歎美之辭不與惡對其所謂天地鬼神之奧言語亦大段誇逞某嘗謂聖賢言語自是平易如孟子尚自有些險處孔子則直是平實不與惡對之說本是楊龜山與總老相遇論孟子說性曽有此言胡文定公往往得之龜山故有是言然總老當時之語猶曰渾然至善不與惡對猶未甚失性善之意今去其渾然至善之語而獨以不與惡對為歎美之辭則其失逺矣如論齊王愛牛此良心之苖裔因私欲而見者以答求放心之問然雞犬之放則固有去而不可收取之理人之放心只知求之則良心在此矣何必等待天理發見於物欲之間然後求之如此則中間空闕多少去處正如屋下失物直待去城外求也愛牛之事孟子只就齊王身上說若施之他人則不可况操存涵養皆是平日工夫豈有等待發見然後操存之理今胡氏子弟議論每每好髙要不在人下才說心便不說用心以為心不可用至如易𫝊中有連使用心字處皆塗去用字某以為孟子所謂堯舜之治天下豈無所用其心哉何獨不可以用言也季隨不以為然胡大時字季隨遂檢文定春秋中有連使用心字處質之方無語大率議論文字須要親切尋究如伊川說顔子樂道為不識顔子者蓋因問者元不曽親切尋究故就其人而答欲其深思而自得之爾後人多因程子之言愈見說得髙逺如是則又不若樂道之為有據伊尹樂堯舜之道亦果非樂道乎湖湘此等氣象乃其素習無怪今日之尤甚也知言云凡人之生粹然天地之心道義全具無適無莫不可以善惡辨不可以是非分無過也無不及也此中之所以名也即告子性無善無不善之論也唯伊川性即理也一句甚切至直卿言五峯說性云好惡性也本是要說得髙不知却反說得低了先生曰依舊是氣質上說某嘗要與他改云所以好惡者性也問知言萬事萬物性之質也如何曰此句亦未有害最是好惡性也大錯既以好惡為性下文却云君子好惡以道則是道乃旋安排入推此其餘皆可見問與告子說話莫同否曰便是湍水之說又問粹然完具云云却說得好又云不可以善惡言不可以是非判曰渠說有二錯一是把性作無頭面物事二是失記問誠者物之終始而命之曰道曰誠是實理徹上徹下只是這箇生物都從那上做來萬物流形乎天地之間都是那底做五峯云誠者命之道中者性之道仁者心之道數句說得密如何大本處却含糊了以性為無善惡天理人欲都混了故把作同體或問同行語如何曰此却是乃就事言之黃直卿曰他既以性無善惡何故云中者性之道曰他也把中做無善惡五峯言天命不囿於善不可以人欲對先生曰天理固無對然有人欲則天理便不得不與人欲對為消長善亦本無對然既有惡則善便不得不與惡對為盛衰且謂天命不囿於物可也謂其不囿於善則不知天之所以為天矣謂惡不足以言性可也謂善不足以言性則不知善之所從來矣好善而惡惡人之性也為有善惡故有好惡善惡字重好惡字輕君子順其性小人拂其性五峯言好惡性也君子好惡以道小人好惡以欲是好人之所惡惡人之所好亦是性也而可乎或問天理人欲同體而異用之說如何先生曰當然之理人合恁地底便是體故仁義禮智為體如五峯之說則仁與不仁義與不義禮與不禮智與不智皆是性如此則性乃一箇大人欲窠子其說乃與東坡子由相似是大鑿脫非小失也同行異情一句却說得去或問胡氏曰天理人欲同體而異用同行而異情曰胡氏之病在於說性無善惡體中只有天理無人欲謂之同體則非也同行異情蓋亦有之如口之於味目之於色耳之於聲鼻之於臭四肢之於安佚聖人與常人皆如此是同行也然聖人之情不溺於此所以與常人異耳或又謂聖賢不視惡色不聽惡聲此則非同行者先生云彼亦就其同行處說耳某謂聖賢立言處處皆通必不若胡氏之偏也龜山云天命之謂性人欲非性也胡氏不取其說是以人欲為性矣此其甚差者也問五峯言天理人欲同體而異用同行而異情如何答曰下句尚可上句有病蓋行處容或可同而其情則本不同也至於體用豈可言異觀天理人欲所以不同者其本原自不同何待用也胡氏之學大率於大本處看不分曉故鋭於闢異端而不免自入一腳也如說性便說性本無善惡發然後方有善惡孟子說性善自是歎美之辭不與惡為對大本處不分曉故所發皆差蓋其說始因龜山問總老而答曰善則本然不與惡對言本然猶可今曰歎美之辭則大段差了又一學者問以放心求心如何他當時問得極緊他一向鶻突應將去大抵心只操則存捨則放了俄頃之間更不喫力他却說得如此周遮問天理人欲同行而異情胡氏此語精若所謂同體而異用則失之混而無别否曰胡氏論性無善惡此句便從這裏來本原處無分别都把做一般所以便謂之同體他看道理儘精微不知如何只一箇大本却無别了問五峯言天理人欲同體而異用同行而異情先生以為同體而異用說未穩是否先生曰亦須是實見此句可疑始得先生曰今人義利處皆無辨直恁鶻突去是須還他是不是若都做得是猶自有箇淺深自如此說必有一箇不是處今則都無理㑹矣或問五峯云天理人欲同體異用先生云如何天理人欲同體得如此却是性可以為善亦可以為惡却是一團人欲窠子將甚麼做體却是韓愈說性自好言人之為性有五仁義禮智信是也指此五者為性却說得是性只有一箇至善道理萬善總天地人物萬善至好底表德胡五峯作皇王大紀說北極如帝星紫微等皆不動說宫聲屬仁不知宫聲却屬信又宫無定體十二律旋相為宫帝星等如果不動則天必擘破不知何故讀書如此不子細五峯說宫之用極大殊不知十二律皆有宫又言宫猶五常之仁宫自屬土亦不屬仁也又其云天有五常座星皆不動今天之不動者只有紫極垣北極五常座不動其他常座如天市垣太微垣大火中星帝座與大角星帝座皆隨天動安得謂不動致堂謂學所以求仁也仁是無頭面底若將實字來解求仁則可若以求仁解學字又沒理㑹了黃直卿云若如此說一部論語只將求仁二字說便了也先生曰南軒五峯說底是致堂說底皆不是安可說如此致堂多有說得好處五峯善思然思過處亦有之謂胡季隨曰文定五峯之學以今竊議來只有太過無不及季隨而今却但有不及又云看知言中議論多病近疏所疑與敬夫伯恭議論如心以成性相為體用性無善惡心無死生天理人欲同體異用先識仁體然後敬有所施先志於大然後從事於小如本天道變化為世俗酬酢及論游夏問孝之類此類極多又其辭意多迫急少寬裕良由務以智力探取全無涵養之功所以至此然其思索精到處何可及也知言謂天命為不囿於物可也以為不囿於善則不知天之所以為天矣謂惡不可以言性可也以為善不足以言性則不知善之所自來矣知言中此等議論與其他好處自相矛盾者甚多却與告子揚子釋氏蘇氏之言幾無以異昨所以不免致疑者正為如此惜乎不及供灑掃於五峯之門而面質之耳知言之書用意精切但其氣象急迫又數大節目亦皆差誤如性無善惡心為己發先知後敬之類皆失聖賢本㫖
